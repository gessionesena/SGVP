{% load static %}

<nav class="navbar navbar-expand-lg navbar-light bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center text-white" href="{% url 'home' %}">
            <img src="{% static 'images/logo.png' %}" alt="Logo" height="50" class="me-2">
            Sistema de Gestão de Vendas e Pagamentos
        </a>

        <div class="collapse navbar-collapse justify-content-end" id="navbarContent">
            {% if user.is_authenticated %}
            <span class="navbar-text text-white me-3">
                <strong>Usuário:</strong> {{ user.get_full_name|default:user.username }}
            </span>
            {% endif %}
        </div>

    </div>
</nav>
